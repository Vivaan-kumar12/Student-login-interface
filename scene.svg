<svg
xmlns="http://www.w3.org/2000/svg"
viewBox="0 0 1080 1920"
preserveAspectRatio="xMidYMid slice"
id="scene">

<defs>

  <linearGradient id="basketGradient" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#9a6428"/>
    <stop offset="100%" stop-color="#5a3312"/>
</linearGradient>

  <linearGradient id="cloudGradient" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#8A4DFF"/>
    <stop offset="35%" stop-color="#B05CFF"/>
    <stop offset="65%" stop-color="#E46AA4"/>
    <stop offset="100%" stop-color="#FF8C6B"/>
</linearGradient>

  <filter id="cloudBlur"
x="-50%"
y="-50%"
width="200%"
height="200%">

<feGaussianBlur stdDeviation="8"/>

</filter>

  <linearGradient id="skyGradient"
x1="0%"
y1="0%"
x2="0%"
y2="100%">

<stop offset="0%" stop-color="#07003b"/>

<stop offset="20%" stop-color="#12005f"/>

<stop offset="45%" stop-color="#35109a"/>

<stop offset="70%" stop-color="#6626b9"/>

<stop offset="90%" stop-color="#d34f8d"/>

<stop offset="100%" stop-color="#ffb255"/>

</linearGradient>
  <radialGradient
id="sunGlow"
cx="50%"
cy="100%"
r="60%">

<stop
offset="0%"
stop-color="#ffe58a"
stop-opacity="1"/>

<stop
offset="18%"
stop-color="#ffca63"
stop-opacity=".85"/>

<stop
offset="40%"
stop-color="#ff9a52"
stop-opacity=".45"/>

<stop
offset="70%"
stop-color="#ff6d7a"
stop-opacity=".18"/>

<stop
offset="100%"
stop-color="#ff6d7a"
stop-opacity="0"/>

</radialGradient>
  
<symbol id="starShape" viewBox="0 0 100 100">

<path
d="M50 6
L61 36
L94 36
L67 55
L77 88
L50 68
L23 88
L33 55
L6 36
L39 36
Z"

fill="#FFD84D"

stroke="#FFF8C4"

stroke-width="2"

stroke-linejoin="round"/>

</symbol>
  
  <radialGradient
id="moonHalo">

<stop
offset="0%"
stop-color="#FFF9C4"
stop-opacity=".22"/>

<stop
offset="55%"
stop-color="#FFD54F"
stop-opacity=".08"/>

<stop
offset="100%"
stop-color="#FFD54F"
stop-opacity="0"/>

</radialGradient>
  
<filter id="starGlow"
x="-100%"
y="-100%"
width="300%"
height="300%">

<feGaussianBlur
stdDeviation="2.5"
result="blur"/>
  
<feMerge>

<feMergeNode in="blur"/>

<feMergeNode in="SourceGraphic"/>

</feMerge>

</filter>
  
</defs>

  <rect
id="sky"
x="0"
y="0"
width="1080"
height="1920"
fill="url(#skyGradient)"/>
  
<g id="stars">

<use href="#starShape" x="70"  y="70"  width="18" height="18"/>
<use href="#starShape" x="250" y="110" width="16" height="16"/>
<use href="#starShape" x="520" y="60"  width="22" height="22"/>
<use href="#starShape" x="760" y="150" width="18" height="18"/>
<use href="#starShape" x="970" y="90"  width="20" height="20"/>

<use href="#starShape" x="120" y="250" width="18" height="18"/>
<use href="#starShape" x="430" y="300" width="16" height="16"/>
<use href="#starShape" x="820" y="350" width="18" height="18"/>

<use href="#starShape" x="150" y="520" width="18" height="18"/>
<use href="#starShape" x="640" y="500" width="18" height="18"/>
<use href="#starShape" x="880" y="620" width="16" height="16"/>

</g>
  
<g id="moonLayer">

    <!-- Moon Glow -->
    <circle
        cx="280"
        cy="300"
        r="110"
        fill="url(#moonHalo)"
        opacity=".9"/>

    <circle
        cx="280"
        cy="300"
        r="70"
        fill="url(#moonHalo)"
        opacity=".5"/>

    <!-- Crescent Moon -->
    <circle
        cx="280"
        cy="300"
        r="42"
        fill="#FFD84D"/>

    <circle
        cx="298"
        cy="288"
        r="39"
        fill="#12005f"/>

 </g>

<ellipse
id="horizonGlow"
cx="540"
cy="1920"
rx="650"
ry="500"
fill="url(#sunGlow)"/>

<g id="starLayer">

</g>

<g id="cloudLayer">

<g transform="translate(860 260)" filter="url(#cloudBlur)">

<ellipse cx="-90" cy="30" rx="38" ry="16" fill="#ff6f7e" opacity=".75"/>
<ellipse cx="-50" cy="38" rx="48" ry="18" fill="#ff6b8a" opacity=".75"/>
<ellipse cx="0" cy="42" rx="60" ry="20" fill="#ff5f86" opacity=".75"/>
<ellipse cx="55" cy="38" rx="46" ry="18" fill="#ff6d91" opacity=".75"/>

<circle cx="-85" cy="0" r="32" fill="#5123b8"/>
<circle cx="-40" cy="-18" r="42" fill="#5d2cc6"/>
<circle cx="10" cy="-22" r="48" fill="#6a36d4"/>
<circle cx="58" cy="-12" r="42" fill="#6632cb"/>
<circle cx="98" cy="4" r="34" fill="#5526b9"/>

<ellipse
cx="-15"
cy="8"
rx="34"
ry="26"
fill="#8f58f2"
opacity=".10"
filter="url(#cloudBlur)"/>

<ellipse
cx="35"
cy="-2"
rx="28"
ry="22"
fill="#a86bff"
opacity=".08"
filter="url(#cloudBlur)"/>
</g>
</g>

<g id="balloon1" transform="translate(775 760) scale(.72)">

    <!-- Balloon Body -->

    <path d="
    M0 -120
    C55 -120 90 -70 90 0
    C90 75 55 125 0 160
    C-55 125 -90 75 -90 0
    C-90 -70 -55 -120 0 -120 Z"
    fill="#ffb45a"/>

    <!-- Panels -->

    <path d="M-55 -98 C-46 -20 -42 70 -36 132 L-10 148 C-14 70 -18 -25 -26 -115 Z"
    fill="#ff5d8f"/>

    <path d="M-8 -120 C-3 -20 0 80 0 160 C0 80 3 -20 8 -120 Z"
    fill="#ffd45b"/>

    <path d="M26 -115 C18 -25 14 70 10 148 L36 132 C42 70 46 -20 55 -98 Z"
    fill="#7a46ff"/>

    <!-- Highlight -->

    <ellipse
    cx="-28"
    cy="-55"
    rx="10"
    ry="28"
    fill="white"
    opacity=".22"/>

    <!-- Neck -->

    <path
    d="
    M-14 160
    L14 160
    L8 185
    L-8 185
    Z"
    fill="#8b5525"/>

    <!-- Ropes -->

    <line x1="-10" y1="185" x2="-13" y2="215"
    stroke="#5d3412" stroke-width="2"/>

    <line x1="10" y1="185" x2="13" y2="215"
    stroke="#5d3412" stroke-width="2"/>

    <line x1="-3" y1="185" x2="-4" y2="215"
    stroke="#5d3412" stroke-width="2"/>

    <line x1="3" y1="185" x2="4" y2="215"
    stroke="#5d3412" stroke-width="2"/>

    <!-- Basket -->

    <rect
    x="-13"
    y="215"
    width="26"
    height="18"
    rx="2"
    fill="#6d4218"/>

    <!-- Burner -->

    <rect
    x="-5"
    y="188"
    width="10"
    height="7"
    fill="#444"/>

    <!-- Flame -->

    <path
    d="
    M0 205
    C-6 196 -5 190 0 182
    C5 190 6 196 0 205
    Z"
    fill="#ffd84d">

        <animate
        attributeName="d"
        dur=".45s"
        repeatCount="indefinite"
        values="
M0 205 C-6 196 -5 190 0 182 C5 190 6 196 0 205 Z;
M0 205 C-4 198 -3 191 0 178 C3 191 4 198 0 205 Z;
M0 205 C-6 196 -5 190 0 182 C5 190 6 196 0 205 Z"/>

    </path>

</g>

<g id="birdLayer">

</g>

<g id="treeLayer">

</g>

<g id="schoolLayer">

</g>

<g id="studentLayer">

</g>

<g id="grassLayer">

</g>

<g id="flowerLayer">

</g>

<g id="fireflyLayer">

</g>

<g id="effectLayer">

</g>

</svg>
