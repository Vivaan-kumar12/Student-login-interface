<svg
xmlns="http://www.w3.org/2000/svg"
viewBox="0 0 1920 1080"
preserveAspectRatio="xMidYMid slice"
id="scene">

<defs>

  <linearGradient id="skyGradient"
x1="0%"
y1="0%"
x2="0%"
y2="100%">

<stop offset="0%" stop-color="#07003b"/>

<stop offset="20%" stop-color="#12005f"/>

<stop offset="45%" stop-color="#35109a"/>

<stop offset="70%" stop-color="#6626b9"/>

<stop offset="90%" stop-color="#d34f8d"/>

<stop offset="100%" stop-color="#ffb255"/>

</linearGradient>
  <rect
id="sky"
x="0"
y="0"
width="1920"
height="1080"
fill="url(#skyGradient)"/>
  <radialGradient
id="sunGlow"
cx="50%"
cy="100%"
r="60%">

<stop
offset="0%"
stop-color="#ffe58a"
stop-opacity="1"/>

<stop
offset="18%"
stop-color="#ffca63"
stop-opacity=".85"/>

<stop
offset="40%"
stop-color="#ff9a52"
stop-opacity=".45"/>

<stop
offset="70%"
stop-color="#ff6d7a"
stop-opacity=".18"/>

<stop
offset="100%"
stop-color="#ff6d7a"
stop-opacity="0"/>

</radialGradient>
<symbol id="starShape" viewBox="0 0 100 100">

<path
d="M50 6
L61 36
L94 36
L67 55
L77 88
L50 68
L23 88
L33 55
L6 36
L39 36
Z"

fill="#FFD84D"

stroke="#FFF8C4"

stroke-width="2"

stroke-linejoin="round"/>

</symbol>
  
  <radialGradient
id="moonHalo">

<stop
offset="0%"
stop-color="#FFF9C4"
stop-opacity=".22"/>

<stop
offset="55%"
stop-color="#FFD54F"
stop-opacity=".08"/>

<stop
offset="100%"
stop-color="#FFD54F"
stop-opacity="0"/>

</radialGradient>
  
<filter id="starGlow"
x="-100%"
y="-100%"
width="300%"
height="300%">

<feGaussianBlur
stdDeviation="2.5"
result="blur"/>

<feMerge>

<feMergeNode in="blur"/>

<feMergeNode in="SourceGraphic"/>

</feMerge>

</filter>
  
</defs>

<g id="stars">

<use href="#starShape"
x="220"
y="80"
width="16"
height="16"
class="star1"/>

<use href="#starShape"
x="410"
y="120"
width="12"
height="12"
class="star2"/>

<use href="#starShape"
x="640"
y="70"
width="18"
height="18"
class="star3"/>

<use href="#starShape"
x="910"
y="140"
width="14"
height="14"
class="star4"/>

<use href="#starShape"
x="1180"
y="90"
width="16"
height="16"
class="star5"/>

<use href="#starShape"
x="1640"
y="60"
width="18"
height="18"
class="star6"/>

<use href="#starShape"
x="1760"
y="180"
width="14"
height="14"
class="star7"/>

<use href="#starShape"
x="1440"
y="260"
width="12"
height="12"
class="star8"/>

</g>

<g id="moonLayer">
  <!-- Moon Glow -->
  <ellipse

cx="1498"

cy="138"

rx="5"

ry="12"

fill="#FFFFFF"

opacity=".45"/>
  <circle

cx="1510"

cy="170"

r="170"

fill="url(#moonHalo)"

opacity=".85"/>

<circle
cx="1510"
cy="170"
r="125"
fill="url(#moonHalo)"/>

  <!-- Crescent Moon -->

<circle

cx="1510"

cy="170"

r="48"

fill="#FFE66A"/>
  <circle

cx="1528"

cy="160"

r="45"

fill="#15254F"/>
  <ellipse

cx="1492"

cy="145"

rx="8"

ry="18"

fill="#FFFDE7"

opacity=".55"/>
</g>

<g id="starLayer">

</g>

<g id="cloudLayer">

</g>

<g id="balloonLayer">

</g>

<g id="birdLayer">

</g>

<g id="treeLayer">

</g>

<g id="schoolLayer">

</g>

<g id="studentLayer">

</g>

<g id="grassLayer">

</g>

<g id="flowerLayer">

</g>

<g id="fireflyLayer">

</g>

<g id="effectLayer">

</g>

</svg>
