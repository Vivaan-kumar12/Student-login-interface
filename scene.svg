<svg
xmlns="http://www.w3.org/2000/svg"
viewBox="0 0 1080 1920"
preserveAspectRatio="xMidYMid slice"
id="scene">

<defs>

  <linearGradient id="cloudGradient" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#8A4DFF"/>
    <stop offset="35%" stop-color="#B05CFF"/>
    <stop offset="65%" stop-color="#E46AA4"/>
    <stop offset="100%" stop-color="#FF8C6B"/>
</linearGradient>

  <filter id="cloudBlur"
x="-50%"
y="-50%"
width="200%"
height="200%">

<feGaussianBlur stdDeviation="8"/>

</filter>

  <linearGradient id="skyGradient"
x1="0%"
y1="0%"
x2="0%"
y2="100%">

<stop offset="0%" stop-color="#07003b"/>

<stop offset="20%" stop-color="#12005f"/>

<stop offset="45%" stop-color="#35109a"/>

<stop offset="70%" stop-color="#6626b9"/>

<stop offset="90%" stop-color="#d34f8d"/>

<stop offset="100%" stop-color="#ffb255"/>

</linearGradient>
  <radialGradient
id="sunGlow"
cx="50%"
cy="100%"
r="60%">

<stop
offset="0%"
stop-color="#ffe58a"
stop-opacity="1"/>

<stop
offset="18%"
stop-color="#ffca63"
stop-opacity=".85"/>

<stop
offset="40%"
stop-color="#ff9a52"
stop-opacity=".45"/>

<stop
offset="70%"
stop-color="#ff6d7a"
stop-opacity=".18"/>

<stop
offset="100%"
stop-color="#ff6d7a"
stop-opacity="0"/>

</radialGradient>
  
<symbol id="starShape" viewBox="0 0 100 100">

<path
d="M50 6
L61 36
L94 36
L67 55
L77 88
L50 68
L23 88
L33 55
L6 36
L39 36
Z"

fill="#FFD84D"

stroke="#FFF8C4"

stroke-width="2"

stroke-linejoin="round"/>

</symbol>
  
  <radialGradient
id="moonHalo">

<stop
offset="0%"
stop-color="#FFF9C4"
stop-opacity=".22"/>

<stop
offset="55%"
stop-color="#FFD54F"
stop-opacity=".08"/>

<stop
offset="100%"
stop-color="#FFD54F"
stop-opacity="0"/>

</radialGradient>
  
<filter id="starGlow"
x="-100%"
y="-100%"
width="300%"
height="300%">

<feGaussianBlur
stdDeviation="2.5"
result="blur"/>
  
<feMerge>

<feMergeNode in="blur"/>

<feMergeNode in="SourceGraphic"/>

</feMerge>

</filter>
  
</defs>

  <rect
id="sky"
x="0"
y="0"
width="1080"
height="1920"
fill="url(#skyGradient)"/>
  
<g id="stars">

<use href="#starShape" x="70"  y="70"  width="18" height="18"/>
<use href="#starShape" x="250" y="110" width="16" height="16"/>
<use href="#starShape" x="520" y="60"  width="22" height="22"/>
<use href="#starShape" x="760" y="150" width="18" height="18"/>
<use href="#starShape" x="970" y="90"  width="20" height="20"/>

<use href="#starShape" x="120" y="250" width="18" height="18"/>
<use href="#starShape" x="430" y="300" width="16" height="16"/>
<use href="#starShape" x="820" y="350" width="18" height="18"/>

<use href="#starShape" x="150" y="520" width="18" height="18"/>
<use href="#starShape" x="640" y="500" width="18" height="18"/>
<use href="#starShape" x="880" y="620" width="16" height="16"/>

</g>
  
<g id="moonLayer">

    <!-- Moon Glow -->
    <circle
        cx="280"
        cy="300"
        r="110"
        fill="url(#moonHalo)"
        opacity=".9"/>

    <circle
        cx="280"
        cy="300"
        r="70"
        fill="url(#moonHalo)"
        opacity=".5"/>

    <!-- Crescent Moon -->
    <circle
        cx="280"
        cy="300"
        r="42"
        fill="#FFD84D"/>

    <circle
        cx="298"
        cy="288"
        r="39"
        fill="#12005f"/>

 </g>

<ellipse
id="horizonGlow"
cx="540"
cy="1920"
rx="650"
ry="500"
fill="url(#sunGlow)"/>

<g id="starLayer">

</g>

<g id="cloudLayer">

<g transform="translate(860 260)" filter="url(#cloudBlur)">

<ellipse cx="-90" cy="30" rx="38" ry="16" fill="#ff6f7e" opacity=".75"/>
<ellipse cx="-50" cy="38" rx="48" ry="18" fill="#ff6b8a" opacity=".75"/>
<ellipse cx="0" cy="42" rx="60" ry="20" fill="#ff5f86" opacity=".75"/>
<ellipse cx="55" cy="38" rx="46" ry="18" fill="#ff6d91" opacity=".75"/>

<circle cx="-85" cy="0" r="32" fill="#5123b8"/>
<circle cx="-40" cy="-18" r="42" fill="#5d2cc6"/>
<circle cx="10" cy="-22" r="48" fill="#6a36d4"/>
<circle cx="58" cy="-12" r="42" fill="#6632cb"/>
<circle cx="98" cy="4" r="34" fill="#5526b9"/>

<ellipse
cx="-15"
cy="8"
rx="34"
ry="26"
fill="#8f58f2"
opacity=".10"
filter="url(#cloudBlur)"/>

<ellipse
cx="35"
cy="-2"
rx="28"
ry="22"
fill="#a86bff"
opacity=".08"
filter="url(#cloudBlur)"/>
</g>
</g>

<g id="balloonLayer">

<g transform="translate(780 720)">

<!-- Balloon Shadow -->
<ellipse
cx="0"
cy="0"
rx="52"
ry="62"
fill="#8a2d7a"
opacity=".18"/>

<!-- Balloon Body -->
<path
d="
M0 -95
C50 -95 72 -40 68 12
C63 58 35 98 0 118
C-35 98 -63 58 -68 12
C-72 -40 -50 -95 0 -95
Z"
fill="#ff9a5e"/>

<!-- Pink Stripe -->
<path
d="
M-42 -78
C-28 -92 -18 -92 -6 -82
L-6 88
C-20 78 -34 58 -42 22
Z"
fill="#ff5f9f"
opacity=".88"/>

<!-- Purple Stripe -->
<path
d="
M6 -82
C18 -92 30 -92 42 -78
L42 22
C34 58 20 78 6 88
Z"
fill="#7b38ff"
opacity=".92"/>

<!-- Center Stripe -->
<path
d="
M-6 -88
C4 -96 8 -96 18 -88
L18 104
C8 110 -2 110 -12 104
Z"
fill="#ffd16b"
opacity=".9"/>

<!-- Top Highlight -->
<ellipse
cx="-18"
cy="-55"
rx="12"
ry="28"
fill="#ffffff"
opacity=".22"/>

<!-- Basket Rope -->
<line
x1="-14"
y1="110"
x2="-8"
y2="142"
stroke="#5c3416"
stroke-width="2"/>

<line
x1="14"
y1="110"
x2="8"
y2="142"
stroke="#5c3416"
stroke-width="2"/>

<!-- Basket -->
<rect
x="-12"
y="142"
width="24"
height="18"
rx="2"
fill="#6b3d17"/>

<rect
x="-10"
y="144"
width="20"
height="4"
fill="#9d6735"
opacity=".5"/>

</g>

</g>

<g id="birdLayer">

</g>

<g id="treeLayer">

</g>

<g id="schoolLayer">

</g>

<g id="studentLayer">

</g>

<g id="grassLayer">

</g>

<g id="flowerLayer">

</g>

<g id="fireflyLayer">

</g>

<g id="effectLayer">

</g>

</svg>
