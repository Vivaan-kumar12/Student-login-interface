<svg
xmlns="http://www.w3.org/2000/svg"
viewBox="0 0 1080 1920"
preserveAspectRatio="xMidYMid slice"
id="scene">

<defs>

  <linearGradient id="cloudGradient" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#8A4DFF"/>
    <stop offset="35%" stop-color="#B05CFF"/>
    <stop offset="65%" stop-color="#E46AA4"/>
    <stop offset="100%" stop-color="#FF8C6B"/>
</linearGradient>

<filter id="cloudBlur">
    <feGaussianBlur stdDeviation="8"/>
</filter>

  <linearGradient id="skyGradient"
x1="0%"
y1="0%"
x2="0%"
y2="100%">

<stop offset="0%" stop-color="#07003b"/>

<stop offset="20%" stop-color="#12005f"/>

<stop offset="45%" stop-color="#35109a"/>

<stop offset="70%" stop-color="#6626b9"/>

<stop offset="90%" stop-color="#d34f8d"/>

<stop offset="100%" stop-color="#ffb255"/>

</linearGradient>
  <radialGradient
id="sunGlow"
cx="50%"
cy="100%"
r="60%">

<stop
offset="0%"
stop-color="#ffe58a"
stop-opacity="1"/>

<stop
offset="18%"
stop-color="#ffca63"
stop-opacity=".85"/>

<stop
offset="40%"
stop-color="#ff9a52"
stop-opacity=".45"/>

<stop
offset="70%"
stop-color="#ff6d7a"
stop-opacity=".18"/>

<stop
offset="100%"
stop-color="#ff6d7a"
stop-opacity="0"/>

</radialGradient>
  
<symbol id="starShape" viewBox="0 0 100 100">

<path
d="M50 6
L61 36
L94 36
L67 55
L77 88
L50 68
L23 88
L33 55
L6 36
L39 36
Z"

fill="#FFD84D"

stroke="#FFF8C4"

stroke-width="2"

stroke-linejoin="round"/>

</symbol>
  
  <radialGradient
id="moonHalo">

<stop
offset="0%"
stop-color="#FFF9C4"
stop-opacity=".22"/>

<stop
offset="55%"
stop-color="#FFD54F"
stop-opacity=".08"/>

<stop
offset="100%"
stop-color="#FFD54F"
stop-opacity="0"/>

</radialGradient>
  
<filter id="starGlow"
x="-100%"
y="-100%"
width="300%"
height="300%">

<feGaussianBlur
stdDeviation="2.5"
result="blur"/>

  <filter id="cloudBlur"
x="-50%"
y="-50%"
width="200%"
height="200%">

<feGaussianBlur stdDeviation="2.5"/>

</filter>
  
<feMerge>

<feMergeNode in="blur"/>

<feMergeNode in="SourceGraphic"/>

</feMerge>

</filter>
  
</defs>

  <rect
id="sky"
x="0"
y="0"
width="1080"
height="1920"
fill="url(#skyGradient)"/>
  
<g id="stars">

<use href="#starShape" x="70"  y="70"  width="18" height="18"/>
<use href="#starShape" x="250" y="110" width="16" height="16"/>
<use href="#starShape" x="520" y="60"  width="22" height="22"/>
<use href="#starShape" x="760" y="150" width="18" height="18"/>
<use href="#starShape" x="970" y="90"  width="20" height="20"/>

<use href="#starShape" x="120" y="250" width="18" height="18"/>
<use href="#starShape" x="430" y="300" width="16" height="16"/>
<use href="#starShape" x="820" y="350" width="18" height="18"/>

<use href="#starShape" x="150" y="520" width="18" height="18"/>
<use href="#starShape" x="640" y="500" width="18" height="18"/>
<use href="#starShape" x="880" y="620" width="16" height="16"/>

</g>
  
<g id="moonLayer">

    <!-- Moon Glow -->
    <circle
        cx="280"
        cy="300"
        r="110"
        fill="url(#moonHalo)"
        opacity=".9"/>

    <circle
        cx="280"
        cy="300"
        r="70"
        fill="url(#moonHalo)"
        opacity=".5"/>

    <!-- Crescent Moon -->
    <circle
        cx="280"
        cy="300"
        r="42"
        fill="#FFD84D"/>

    <circle
        cx="298"
        cy="288"
        r="39"
        fill="#12005f"/>

 </g>

<ellipse
id="horizonGlow"
cx="540"
cy="1920"
rx="650"
ry="500"
fill="url(#sunGlow)"/>

<g id="starLayer">

</g>

<g id="cloudLayer">

<g id="cloud1" filter="url(#cloudBlur)" opacity=".9">

<path
d="
M0 40
C20 5 60 5 80 30
C95 0 145 0 160 35
C195 10 235 20 240 50
C235 70 205 75 180 72
H40
C15 72 -5 60 0 40
Z"
fill="#6b3fd5"/>

<ellipse
cx="120"
cy="58"
rx="110"
ry="18"
fill="#ff6b9a"
opacity=".45"/>

</g>
</g>

<g id="balloonLayer">

</g>

<g id="birdLayer">

</g>

<g id="treeLayer">

</g>

<g id="schoolLayer">

</g>

<g id="studentLayer">

</g>

<g id="grassLayer">

</g>

<g id="flowerLayer">

</g>

<g id="fireflyLayer">

</g>

<g id="effectLayer">

</g>

</svg>
