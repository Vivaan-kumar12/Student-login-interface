<svg
xmlns="http://www.w3.org/2000/svg"
viewBox="0 0 1080 1920"
preserveAspectRatio="xMidYMid slice"
id="scene">

<defs>

  <linearGradient id="basketGradient" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#9a6428"/>
    <stop offset="100%" stop-color="#5a3312"/>
</linearGradient>

  <linearGradient id="cloudGradient" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#8A4DFF"/>
    <stop offset="35%" stop-color="#B05CFF"/>
    <stop offset="65%" stop-color="#E46AA4"/>
    <stop offset="100%" stop-color="#FF8C6B"/>
</linearGradient>

  <filter id="cloudBlur"
x="-50%"
y="-50%"
width="200%"
height="200%">

<feGaussianBlur stdDeviation="8"/>

</filter>

  <linearGradient id="skyGradient"
x1="0%"
y1="0%"
x2="0%"
y2="100%">

<stop offset="0%" stop-color="#07003b"/>

<stop offset="20%" stop-color="#12005f"/>

<stop offset="45%" stop-color="#35109a"/>

<stop offset="70%" stop-color="#6626b9"/>

<stop offset="90%" stop-color="#d34f8d"/>

<stop offset="100%" stop-color="#ffb255"/>

</linearGradient>
  <radialGradient
id="sunGlow"
cx="50%"
cy="100%"
r="60%">

<stop
offset="0%"
stop-color="#ffe58a"
stop-opacity="1"/>

<stop
offset="18%"
stop-color="#ffca63"
stop-opacity=".85"/>

<stop
offset="40%"
stop-color="#ff9a52"
stop-opacity=".45"/>

<stop
offset="70%"
stop-color="#ff6d7a"
stop-opacity=".18"/>

<stop
offset="100%"
stop-color="#ff6d7a"
stop-opacity="0"/>

</radialGradient>
  
<symbol id="starShape" viewBox="0 0 100 100">

<path
d="M50 6
L61 36
L94 36
L67 55
L77 88
L50 68
L23 88
L33 55
L6 36
L39 36
Z"

fill="#FFD84D"

stroke="#FFF8C4"

stroke-width="2"

stroke-linejoin="round"/>

</symbol>
  
  <radialGradient
id="moonHalo">

<stop
offset="0%"
stop-color="#FFF9C4"
stop-opacity=".22"/>

<stop
offset="55%"
stop-color="#FFD54F"
stop-opacity=".08"/>

<stop
offset="100%"
stop-color="#FFD54F"
stop-opacity="0"/>

</radialGradient>
  
<filter id="starGlow"
x="-100%"
y="-100%"
width="300%"
height="300%">

<feGaussianBlur
stdDeviation="2.5"
result="blur"/>
  
<feMerge>

<feMergeNode in="blur"/>

<feMergeNode in="SourceGraphic"/>

</feMerge>

</filter>
  
</defs>

  <rect
id="sky"
x="0"
y="0"
width="1080"
height="1920"
fill="url(#skyGradient)"/>
  
<g id="stars">

<use href="#starShape" x="70"  y="70"  width="18" height="18"/>
<use href="#starShape" x="250" y="110" width="16" height="16"/>
<use href="#starShape" x="520" y="60"  width="22" height="22"/>
<use href="#starShape" x="760" y="150" width="18" height="18"/>
<use href="#starShape" x="970" y="90"  width="20" height="20"/>

<use href="#starShape" x="120" y="250" width="18" height="18"/>
<use href="#starShape" x="430" y="300" width="16" height="16"/>
<use href="#starShape" x="820" y="350" width="18" height="18"/>

<use href="#starShape" x="150" y="520" width="18" height="18"/>
<use href="#starShape" x="640" y="500" width="18" height="18"/>
<use href="#starShape" x="880" y="620" width="16" height="16"/>

</g>
  
<g id="moonLayer">

    <!-- Moon Glow -->
    <circle
        cx="280"
        cy="300"
        r="110"
        fill="url(#moonHalo)"
        opacity=".9"/>

    <circle
        cx="280"
        cy="300"
        r="70"
        fill="url(#moonHalo)"
        opacity=".5"/>

    <!-- Crescent Moon -->
    <circle
        cx="280"
        cy="300"
        r="42"
        fill="#FFD84D"/>

    <circle
        cx="298"
        cy="288"
        r="39"
        fill="#12005f"/>

 </g>

<ellipse
id="horizonGlow"
cx="540"
cy="1920"
rx="650"
ry="500"
fill="url(#sunGlow)"/>

<g id="starLayer">

</g>

<g id="cloudLayer">

<g transform="translate(860 260)" filter="url(#cloudBlur)">

<ellipse cx="-90" cy="30" rx="38" ry="16" fill="#ff6f7e" opacity=".75"/>
<ellipse cx="-50" cy="38" rx="48" ry="18" fill="#ff6b8a" opacity=".75"/>
<ellipse cx="0" cy="42" rx="60" ry="20" fill="#ff5f86" opacity=".75"/>
<ellipse cx="55" cy="38" rx="46" ry="18" fill="#ff6d91" opacity=".75"/>

<circle cx="-85" cy="0" r="32" fill="#5123b8"/>
<circle cx="-40" cy="-18" r="42" fill="#5d2cc6"/>
<circle cx="10" cy="-22" r="48" fill="#6a36d4"/>
<circle cx="58" cy="-12" r="42" fill="#6632cb"/>
<circle cx="98" cy="4" r="34" fill="#5526b9"/>

<ellipse
cx="-15"
cy="8"
rx="34"
ry="26"
fill="#8f58f2"
opacity=".10"
filter="url(#cloudBlur)"/>

<ellipse
cx="35"
cy="-2"
rx="28"
ry="22"
fill="#a86bff"
opacity=".08"
filter="url(#cloudBlur)"/>
</g>
</g>

<g id="balloonLayer"
transform="translate(770 760) scale(1.0)">

    <!-- Balloon Body -->
    <path
    d="
    M0 -150
    C70 -150 105 -80 105 0
    C105 80 70 145 0 190
    C-70 145 -105 80 -105 0
    C-105 -80 -70 -150 0 -150
    Z"
    fill="#ffb45f"/>

    <!-- Vertical Panels -->

    <path
    d="M-78 -120
       C-65 -30 -60 70 -52 145
       L-18 170
       C-25 75 -28 -35 -38 -145
       Z"
    fill="#ff6a97"/>

    <path
    d="M-30 -148
       C-20 -35 -16 78 -12 182
       L12 182
       C16 80 20 -35 30 -148
       Z"
    fill="#ffd76a"/>

    <path
    d="M38 -145
       C28 -35 25 72 18 170
       L52 145
       C60 70 65 -30 78 -120
       Z"
    fill="#7c3cff"/>

    <!-- Highlight -->

    <ellipse
    cx="-38"
    cy="-70"
    rx="14"
    ry="36"
    fill="white"
    opacity=".25"/>

    <!-- Neck -->

    <path
    d="
    M-20 180
    L20 180
    L12 212
    L-12 212
    Z"
    fill="#9b5c2a"/>

    <!-- Ropes -->

    <line x1="-12" y1="212" x2="-18" y2="248"
    stroke="#5e3d16" stroke-width="2"/>

    <line x1="12" y1="212" x2="18" y2="248"
    stroke="#5e3d16" stroke-width="2"/>

    <line x1="-4" y1="212" x2="-6" y2="248"
    stroke="#5e3d16" stroke-width="2"/>

    <line x1="4" y1="212" x2="6" y2="248"
    stroke="#5e3d16" stroke-width="2"/>

    <!-- Basket -->

    <rect
    x="-18"
    y="248"
    width="36"
    height="28"
    rx="2"
    fill="url(#basketGradient)"/>

</g>

<g id="birdLayer">

</g>

<g id="treeLayer">

</g>

<g id="schoolLayer">

</g>

<g id="studentLayer">

</g>

<g id="grassLayer">

</g>

<g id="flowerLayer">

</g>

<g id="fireflyLayer">

</g>

<g id="effectLayer">

</g>

</svg>
